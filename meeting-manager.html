    <link rel="manifest" href="site.webmanifest" />
    <script>
      // Pre-mount theme so we don't flash light->dark when the React effect lands.
      (function () {
        try {
          var saved = window.localStorage.getItem("meeting-manager.v2.state");
          var theme = saved ? JSON.parse(saved).theme : "";
          if (
            !theme &&
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            theme = "dark";
          }
          document.documentElement.dataset.theme =
            theme === "dark" ? "dark" : "light";
        } catch (_) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>

      :root {

        --line-strong: rgba(10, 10, 15, 0.13);
        --line-highlight: rgba(255, 255, 255, 0.6);

        --accent-glow: color-mix(in oklch, var(--accent) 18%, transparent);

        --warn: #a16b00;

        --shadow-md:

          0 8px 24px -12px rgba(10, 10, 15, 0.12);
        --shadow-lg:
          0 4px 12px rgba(10, 10, 15, 0.06),
          0 20px 48px -20px rgba(10, 10, 15, 0.18);
        --shadow: var(--shadow-md);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 14px;
        --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;

        --bg-gradient:
          radial-gradient(
            1200px 700px at 70% -10%,
            color-mix(in oklch, var(--accent) 6%, transparent),
            transparent 60%
          ),
          radial-gradient(
            900px 600px at -10% 90%,
            color-mix(in oklch, var(--accent) 4%, transparent),
            transparent 50%
          );
      }

      html[data-theme="dark"] {
        /* Dark theme — deep, slightly-cool near-black with raised surfaces */

        --paper-2: #0f0f13;
        --surface: #131318;

        --line-highlight: rgba(255, 255, 255, 0.06);
        --accent: #8b8bff;

        --good: #5fbe8e;
        --warn: #d4a046;

        --shadow-sm:

        --shadow-md:

        --shadow-lg:
          0 4px 16px rgba(0, 0, 0, 0.55), 0 24px 60px -20px rgba(0, 0, 0, 0.8);
        --shadow: var(--shadow-md);
        --bg-gradient:
          radial-gradient(
            1200px 700px at 70% -10%,
            color-mix(in oklch, var(--accent) 8%, transparent),
            transparent 60%

          radial-gradient(

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        font-feature-settings: "ss01", "cv11", "ss03";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;

      #root {

        outline: none;

          0 0 0 2px var(--paper),
          0 0 0 4px var(--accent-glow);
      }

      /* Smoother scrollbars */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line-strong);
        background-clip: padding-box;
        border: 3px solid transparent;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
        background-clip: padding-box;
        border: 3px solid transparent;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>

        const __TWEAKS_STYLE = `

      .twk-btn:hover{background:rgba(0,0,0,.88)}

        0 2px 6px rgba(0,0,0,.15)}

        function useTweaks(defaults) {
          const [values, setValues] = React.useState(defaults);
          const setTweak = React.useCallback((keyOrEdits, val) => {
            const edits =
              typeof keyOrEdits === "object" && keyOrEdits !== null
                ? keyOrEdits
                : { [keyOrEdits]: val };
            setValues((prev) => ({ ...prev, ...edits }));
            try {
              window.parent.postMessage(
                { type: "__edit_mode_set_keys", edits },
                "*",
              );
            } catch (_) {}
            window.dispatchEvent(
              new CustomEvent("tweakchange", { detail: edits }),
            );
          }, []);
          return [values, setTweak];
        }

        function TweaksPanel({ title = "Tweaks", children }) {
          const [open, setOpen] = React.useState(false);
          const dragRef = React.useRef(null);
          const offsetRef = React.useRef({ x: 16, y: 16 });
          const PAD = 16;

          const clampToViewport = React.useCallback(() => {
            const panel = dragRef.current;
            if (!panel) return;
            const w = panel.offsetWidth,
              h = panel.offsetHeight;
            const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
            const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
            offsetRef.current = {
              x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
              y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
            };
            panel.style.right = offsetRef.current.x + "px";
            panel.style.bottom = offsetRef.current.y + "px";
          }, []);

          React.useEffect(() => {
            if (!open) return;
            clampToViewport();
            if (typeof ResizeObserver === "undefined") {
              window.addEventListener("resize", clampToViewport);
              return () =>
                window.removeEventListener("resize", clampToViewport);
            }
            const ro = new ResizeObserver(clampToViewport);
            ro.observe(document.documentElement);
            return () => ro.disconnect();
          }, [open, clampToViewport]);

          React.useEffect(() => {
            const onMsg = (e) => {
              const t = e?.data?.type;
              if (t === "__activate_edit_mode") setOpen((cur) => !cur);
              else if (t === "__deactivate_edit_mode") setOpen(false);
            };
            window.addEventListener("message", onMsg);
            return () => window.removeEventListener("message", onMsg);
          }, []);

          const dismiss = () => {
            setOpen(false);
          };

          const onDragStart = (e) => {
            const panel = dragRef.current;
            if (!panel) return;
            const r = panel.getBoundingClientRect();
            const sx = e.clientX,
              sy = e.clientY;
            const startRight = window.innerWidth - r.right;
            const startBottom = window.innerHeight - r.bottom;
            const move = (ev) => {
              offsetRef.current = {
                x: startRight - (ev.clientX - sx),
                y: startBottom - (ev.clientY - sy),
              };
              clampToViewport();
            };
            const up = () => {
              window.removeEventListener("mousemove", move);
              window.removeEventListener("mouseup", up);
            };
            window.addEventListener("mousemove", move);
            window.addEventListener("mouseup", up);
          };

          if (!open) return null;
          return (
            <>
              <style>{__TWEAKS_STYLE}</style>
              <div
                ref={dragRef}
                className="twk-panel"
                style={{
                  right: offsetRef.current.x,
                  bottom: offsetRef.current.y,
                }}
              >
                <div className="twk-hd" onMouseDown={onDragStart}>
                  <b>{title}</b>
                  <button
                    className="twk-x"
                    aria-label="Close tweaks"
                    onMouseDown={(e) => e.stopPropagation()}
                    onClick={dismiss}
                  >
                    ✕
                  </button>
                </div>
                <div className="twk-body">{children}</div>
              </div>
            </>
          );
        }

        function TweakSection({ label, children }) {
          return (
            <>
              <div className="twk-sect">{label}</div>
              {children}
            </>
          );
        }

        function TweakRow({ label, value, children, inline = false }) {
          return (
            <div className={inline ? "twk-row twk-row-h" : "twk-row"}>
              <div className="twk-lbl">
                <span>{label}</span>
                {value != null && <span className="twk-val">{value}</span>}
              </div>
              {children}
            </div>
          );
        }

        function TweakSlider({
          label,
          value,
          min = 0,
          max = 100,
          step = 1,
          unit = "",
          onChange,
        }) {
          return (
            <TweakRow label={label} value={`${value}${unit}`}>
              <input
                type="range"
                className="twk-slider"
                min={min}
                max={max}
                step={step}
                value={value}
                onChange={(e) => onChange(Number(e.target.value))}
              />
            </TweakRow>
          );
        }

        function TweakToggle({ label, value, onChange }) {
          return (
            <div className="twk-row twk-row-h">
              <div className="twk-lbl">
                <span>{label}</span>
              </div>
              <button
                type="button"
                className="twk-toggle"
                data-on={value ? "1" : "0"}
                role="switch"
                aria-checked={!!value}
                onClick={() => onChange(!value)}
              >
                <i />
              </button>
            </div>
          );
        }

        function TweakSelect({ label, value, options, onChange }) {
          return (
            <TweakRow label={label}>
              <select
                className="twk-field"
                value={value}
                onChange={(e) => onChange(e.target.value)}
              >
                {options.map((o) => {
                  const v = typeof o === "object" ? o.value : o;
                  const l = typeof o === "object" ? o.label : o;
                  return (
                    <option key={v} value={v}>
                      {l}
                    </option>
                  );
                })}
              </select>
            </TweakRow>
          );
        }

        function TweakColor({ label, value, options, onChange }) {
          const key = (o) => String(JSON.stringify(o)).toLowerCase();
          const cur = key(value);
          const isLight = (hex) => {
            const h = String(hex).replace("#", "");
            const x =
              h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, "0");
            const n = parseInt(x.slice(0, 6), 16);
            if (Number.isNaN(n)) return true;
            const r = (n >> 16) & 255,
              g = (n >> 8) & 255,
              b = n & 255;
            return r * 299 + g * 587 + b * 114 > 148000;
          };
          const Check = ({ light }) => (
            <svg viewBox="0 0 14 14" aria-hidden="true">
              <path
                d="M3 7.2 5.8 10 11 4.2"
                fill="none"
                strokeWidth="2.2"
                strokeLinecap="round"
                strokeLinejoin="round"
                stroke={light ? "rgba(0,0,0,.78)" : "#fff"}
              />
            </svg>
          );
          return (
            <TweakRow label={label}>
              <div className="twk-chips" role="radiogroup">
                {options.map((o, i) => {
                  const colors = Array.isArray(o) ? o : [o];
                  const hero = colors[0];
                  const on = key(o) === cur;
                  return (
                    <button
                      key={i}
                      type="button"
                      className="twk-chip"
                      role="radio"
                      aria-checked={on}
                      data-on={on ? "1" : "0"}
                      aria-label={colors.join(", ")}
                      title={colors.join(" · ")}
                      style={{ background: hero }}
                      onClick={() => onChange(o)}
                    >
                      {on && <Check light={isLight(hero)} />}
                    </button>
                  );
                })}
              </div>
            </TweakRow>
          );
        }

        function TweakButton({ label, onClick, secondary = false }) {
          return (
            <button
              type="button"
              className={secondary ? "twk-btn secondary" : "twk-btn"}
              onClick={onClick}
            >
              {label}
            </button>
          );
        }

        Object.assign(window, {
          useTweaks,
          TweaksPanel,
          TweakSection,
          TweakRow,
          TweakSlider,
          TweakToggle,
          TweakSelect,
          TweakColor,
          TweakButton,
        });
      })();
    </script>

    <!-- parser -->
    <script type="text/babel" data-presets="react">
      (function () {
        function stripMd(s) {
          return String(s || "")
            .replace(/\*\*(.+?)\*\*/g, "$1")
            .replace(/\*(.+?)\*/g, "$1")
            .replace(/`(.+?)`/g, "$1")
            .trim();
        }

        function parseAdmins(block) {
          const roles = [];
          const lines = block.split(/\r?\n/);
          for (const raw of lines) {
            const m = raw.match(/^\s*[-*]\s+(.*)$/);
            if (!m) continue;
            const cleaned = stripMd(m[1]);
            const kv = cleaned.match(/^([^:]+):\s*(.+)$/);
            if (!kv) continue;
            roles.push({ role: kv[1].trim(), value: kv[2].trim() });
          }
          return roles;
        }

        const UNIT = "(?:minutes|minute|mins|min|seconds|second|secs|sec|m|s)";
        const PART = `\\d+(?:\\.\\d+)?\\s*${UNIT}\\b`;
        const TOKEN = `${PART}(?:\\s+${PART})?`;

        function parseDurationToken(str) {
          const re =
            /(\d+(?:\.\d+)?)\s*(minutes|minute|mins|min|seconds|second|secs|sec|m|s)\b/gi;
          let total = 0,
            any = false,
            m;
          while ((m = re.exec(str)) !== null) {
            const n = parseFloat(m[1]);
            const u = m[2].toLowerCase();
            const isSec = u === "s" || u.startsWith("sec");
            total += n * (isSec ? 1000 : 60000);
            any = true;
          }
          return any ? Math.max(1, Math.round(total)) : null;
        }

        function formatDurLabel(ms) {
          const totalSec = Math.round(ms / 1000);
          if (totalSec < 60) return `${totalSec} sec`;
          const m = Math.floor(totalSec / 60);
          const s = totalSec % 60;
          if (s === 0) return `${m} min`;
          return `${m} min ${s} sec`;
        }

        function parseDeadline(text) {
          const m = text.match(/by\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
          if (!m) return null;
          let h = parseInt(m[1], 10);
          const mins = m[2] ? parseInt(m[2], 10) : 0;
          const ap = (m[3] || "").toLowerCase();
          if (ap === "pm" && h < 12) h += 12;
          if (ap === "am" && h === 12) h = 0;
          return { h, m: mins, raw: m[0].replace(/^by\s+/i, "") };
        }

        function fmtClock(h, m, s) {
          const hh = ((h + 11) % 12) + 1;
          const ap = h >= 12 ? "PM" : "AM";
          const secs = s ? `:${String(s).padStart(2, "0")}` : "";
          return `${hh}:${String(m).padStart(2, "0")}${secs} ${ap}`;
        }

        const MONTH_NAMES = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];

        function formatDiscordTimestamp(seconds, style = "f") {
          const date = new Date(Number(seconds) * 1000);
          if (!Number.isFinite(date.getTime())) return null;
          const dateLabel = `${date.getDate()} ${MONTH_NAMES[date.getMonth()]} ${date.getFullYear()}`;
          const timeLabel = fmtClock(
            date.getHours(),
            date.getMinutes(),
            style === "T" ? date.getSeconds() : 0,
          );
          if (style === "t" || style === "T") return timeLabel;
          if (style === "d" || style === "D") return dateLabel;
          // Discord's f, F, R, and default styles all contain enough
          // information to become an absolute, agenda-compatible local time.
          return `${dateLabel} ${timeLabel}`;
        }

        function convertDiscordTimestamps(markdown) {
          return String(markdown || "").replace(
            /<t:(-?\d+)(?::([tTdDfFR]))?>/g,
            (token, seconds, style) =>
              formatDiscordTimestamp(seconds, style || "f") || token,
          );
        }

        const STRIP_PERPERSON = new RegExp(
          `(?:max\\s+)?${TOKEN}\\s*(?:max\\s*)?per\\s+person`,
          "gi",
        );
        function splitTitle(raw) {
          const m = raw.match(/^(.*?)\s*\(([^)]*)\)\s*$/);
          if (!m) return { title: raw.trim(), names: [] };
          const names = m[2]
            .split(",")
            .map((n) => stripMd(n.replace(STRIP_PERPERSON, "")).trim())
            .filter(Boolean);
          return { title: m[1].trim(), names };
        }

        const SEP_RE = new RegExp(
          `\\s+(?:[\\u2014\\u2013]|--|-)\\s*(?=(?:max\\s+)?${TOKEN})`,
          "i",
        );
        const DUR_RE = new RegExp(`^(${TOKEN})`, "i");
        const PERPERSON_RE = new RegExp(
          `(?:max\\s+)?(${TOKEN})\\s*(?:max\\s*)?per\\s+person`,
          "i",
        );

        function parseAgendaLine(raw, idx) {
          const text = stripMd(raw);
          const sep = text.match(SEP_RE);
          if (!sep) return { error: "Missing duration for: " + text };
          const titlePart = text.slice(0, sep.index).trim();
          const detailPart = text.slice(sep.index + sep[0].length).trim();
          const durM = detailPart.match(DUR_RE);
          if (!durM) return { error: "Missing duration value: " + text };
          const perPersonM = (titlePart + " " + detailPart).match(PERPERSON_RE);
          const { title, names } = splitTitle(titlePart);
          let durationMs = parseDurationToken(durM[1]);
          const deadline = parseDeadline(detailPart);
          let subs = [];
          let perPersonMs = null;
          if (perPersonM) {
            perPersonMs = parseDurationToken(perPersonM[1]);
            if (names.length) {
              subs = names.map((n, i) => ({
                name: n,
                durationMs: perPersonMs,
                key: `${idx + 1}.${i}`,
              }));
              durationMs = perPersonMs * subs.length;
            }
          }
          return {
            agendaIndex: idx + 1,
            sourceText: raw.trim(),
            title: title || "Untitled",
            names,
            durationMs,
            durationLabel: formatDurLabel(perPersonMs || durationMs),
            perPersonMs,
            deadline,
            deadlineLabel: deadline ? fmtClock(deadline.h, deadline.m) : null,
            subs,
            key: subs.length ? null : String(idx + 1),
          };
        }

        function findSection(text, header) {
          const re = new RegExp(
            `\\*\\*\\s*${header}\\s*\\*\\*\\s*\\n([\\s\\S]*?)(?=\\n\\s*\\*\\*|$)`,
            "i",
          );
          const m = text.match(re);
          return m ? m[1] : "";
        }

        function parseAgendaSection(block) {
          const lines = block.split(/\r?\n/);
          const out = [];
          for (const raw of lines) {
            const m = raw.match(/^\s*(?:\d+\.\s+|[-*]\s+)(.*\S)\s*$/);
            if (!m) continue;
            out.push(m[1]);
          }
          return out;
        }

        const MONTHS = {
          jan: 0,
          january: 0,
          feb: 1,
          february: 1,
          mar: 2,
          march: 2,
          apr: 3,
          april: 3,
          may: 4,
          jun: 5,
          june: 5,
          jul: 6,
          july: 6,
          aug: 7,
          august: 7,
          sep: 8,
          sept: 8,
          september: 8,
          oct: 9,
          october: 9,
          nov: 10,
          november: 10,
          dec: 11,
          december: 11,
        };

        function parseStartDatePrefix(prefix) {
          const cleaned = String(prefix || "").trim().replace(/,\s*$/, "");
          if (!cleaned) return null;
          let m = cleaned.match(
            /^(\d{1,2})(?:st|nd|rd|th)?\s+([a-z]+)(?:\s+(\d{4}))?$/i,
          );
          if (!m) {
            m = cleaned.match(
              /^([a-z]+)\s+(\d{1,2})(?:st|nd|rd|th)?(?:,?\s+(\d{4}))?$/i,
            );
            if (!m) return null;
            m = [m[0], m[2], m[1], m[3]];
          }
          const monthIndex = MONTHS[m[2].toLowerCase()];
          if (monthIndex == null) return null;
          const day = parseInt(m[1], 10);
          const year = m[3] ? parseInt(m[3], 10) : new Date().getFullYear();
          if (day < 1 || day > 31) return null;
          return { year, monthIndex, day };
        }

        function dateForStartTime(startTime) {
          const d = new Date();
          if (startTime.date) {
            d.setFullYear(
              startTime.date.year,
              startTime.date.monthIndex,
              startTime.date.day,
            );
          }
          d.setHours(startTime.h, startTime.m, 0, 0);
          return d;
        }

        function deadlineDateForStart(deadline, startTime, after) {
          const d = startTime ? dateForStartTime(startTime) : new Date();
          d.setHours(deadline.h, deadline.m, 0, 0);
          const floor = after || (startTime?.date ? dateForStartTime(startTime) : null);
          if (floor) {
            while (d.getTime() < floor.getTime()) {
              d.setDate(d.getDate() + 1);
            }
          }
          return d;
        }

        function parseStartTime(text) {
          const m = String(text || "").match(
            /\*\*\s*Start\s*Time\s*:?\s*\*\*\s*:?\s*([^\n]+)/i,
          );
          if (!m) return null;
          const tm = m[1]
            .trim()
            .match(/^(?:(.*?)\s+)?(\d{1,2})(?::(\d{2}))?\s*(am|pm)?\b/i);
          if (!tm) return null;
          const date = parseStartDatePrefix(tm[1]);
          if (tm[1] && !date) return null;
          let h = parseInt(tm[2], 10);
          const mins = tm[3] ? parseInt(tm[3], 10) : 0;
          const ap = (tm[4] || "").toLowerCase();
          if (ap === "pm" && h < 12) h += 12;
          if (ap === "am" && h === 12) h = 0;
          return { h, m: mins, date };
        }

        function parseAgenda(markdown) {
          const text = convertDiscordTimestamps(markdown).replace(/\r\n/g, "\n");
          const titleM = text.match(/^\s*#\s+(.+?)\s*$/m);
          const meetingTitle = titleM ? stripMd(titleM[1]) : "Meeting";

          const adminsBlock = findSection(text, "Meeting Admins");
          const agendaBlock = findSection(text, "Agenda");

          const admins = parseAdmins(adminsBlock);
          const startTime = parseStartTime(text);
          const errors = [];
          const items = [];
          parseAgendaSection(agendaBlock).forEach((line, i) => {
            const r = parseAgendaLine(line, i);
            if (r.error) errors.push(r.error);
            else items.push(r);
          });

          if (!adminsBlock) errors.push("Meeting Admins section not found");
          if (!agendaBlock) errors.push("Agenda section not found");
          if (!startTime) {
            errors.push(
              'Missing **Start Time** — add a line like "**Start Time:** 1 PM" or "**Start Time:** 23 July 1:25 AM" right after the title so clock times can be computed.',
            );
          }

          const hasAnyDeadline = items.some((it) => it.deadline);
          let running = null;
          if (startTime) {
            running = dateForStartTime(startTime);
          } else if (!hasAnyDeadline && items.length) {
            const now = new Date();
            const m = now.getMinutes();
            now.setMinutes(m + ((5 - (m % 5)) % 5 || 5), 0, 0);
            running = now;
          }
          items.forEach((it) => {
            if (it.deadline) {
              const d = deadlineDateForStart(it.deadline, startTime, running);
              running = d;
            } else if (running) {
              running = new Date(running.getTime() + it.durationMs);
              it.deadline = { h: running.getHours(), m: running.getMinutes() };
              it.deadlineLabel = fmtClock(
                running.getHours(),
                running.getMinutes(),
              );
              it.deadlineComputed = true;
            }
            if (it.subs.length && running) {
              const parentEnd = running.getTime();
              const parentStart = parentEnd - it.durationMs;
              let subRun = parentStart;
              it.subs.forEach((s, si) => {
                subRun += s.durationMs;
                const t = si === it.subs.length - 1 ? parentEnd : subRun;
                const d = new Date(t);
                s.deadline = { h: d.getHours(), m: d.getMinutes() };
                s.deadlineLabel = fmtClock(d.getHours(), d.getMinutes());
              });
            }
          });

          for (let i = items.length - 2; i >= 0; i--) {
            const it = items[i];
            if (it.deadline) continue;
            const next = items[i + 1];
            if (!next || !next.deadline) continue;
            const nd = deadlineDateForStart(next.deadline, startTime);
            const end = new Date(nd.getTime() - next.durationMs);
            it.deadline = { h: end.getHours(), m: end.getMinutes() };
            it.deadlineLabel = fmtClock(end.getHours(), end.getMinutes());
            it.deadlineComputed = true;
            if (it.subs.length) {
              const parentEnd = end.getTime();
              const parentStart = parentEnd - it.durationMs;
              let subRun = parentStart;
              it.subs.forEach((s, si) => {
                subRun += s.durationMs;
                const t = si === it.subs.length - 1 ? parentEnd : subRun;
                const d = new Date(t);
                s.deadline = { h: d.getHours(), m: d.getMinutes() };
                s.deadlineLabel = fmtClock(d.getHours(), d.getMinutes());
              });
            }
          }

          const slides = [{ kind: "title", title: meetingTitle, admins }];
          items.forEach((it) => {
            if (it.subs.length) {
              slides.push({ kind: "agenda", item: it, subIndex: null });
              it.subs.forEach((s, si) =>
                slides.push({ kind: "agenda", item: it, subIndex: si }),
              );
            } else {
              slides.push({ kind: "agenda", item: it, subIndex: null });
            }
          });
          slides.push({ kind: "complete", title: "Meeting complete" });

          const totalMs = items.reduce((s, i) => s + i.durationMs, 0);
          return {
            meetingTitle,
            admins,
            startTime,
            items,
            slides,
            errors,
            totalMs,
            totalLabel: formatDurLabel(totalMs),
          };
        }

        const DEADLINE_TOKEN_RE =
          /\bby\s+\d{1,2}(?::\d{2})?\s*(?:[ap]\.?m\.?)?/i;

        function replaceAgendaDeadline(line, deadlineLabel) {
          if (DEADLINE_TOKEN_RE.test(line)) {
            return line.replace(DEADLINE_TOKEN_RE, `by ${deadlineLabel}`);
          }
          // Strip a dangling partial "by H:MM AM/PM" suffix the user left behind
          // (e.g. they deleted some-but-not-all of the time) so we don't end up
          // with "..., b, by 1:28 PM" or "..., by, by 1:14 PM". Handles every
          // truncation point of ", by 1:28 PM": ", b", ", by", ", by 1",
          // ", by 1:2", ", by 1:28", ", by 1:28 P", etc. Also handles a bare
          // trailing comma.
          const cleaned = line
            .replace(
              /,?\s*\bby?\b(?:\s+\d{1,2}(?::\d{0,2})?\s*[ap]?\.?m?\.?)?\s*$/i,
              "",
            )
            .replace(/,\s*$/, "")
            .replace(/\s+$/, "");
          return `${cleaned}, by ${deadlineLabel}`;
        }

        function stripAgendaDeadlinesForSchedule(text) {
          const lines = String(text || "")
            .replace(/\r\n/g, "\n")
            .split("\n");
          let inAgenda = false;
          for (let i = 0; i < lines.length; i++) {
            const trimmed = lines[i].trim();
            const headerM = trimmed.match(/^\*\*\s*(.+?)\s*\*\*\s*$/);
            if (headerM) {
              inAgenda = /^agenda$/i.test(headerM[1]);
              continue;
            }
            if (!inAgenda) continue;
            if (!/^\s*(?:\d+\.\s+|[-*]\s+)/.test(lines[i])) continue;
            lines[i] = lines[i]
              .replace(DEADLINE_TOKEN_RE, "")
              .replace(/,\s*(?=(?:\/|$))/, " ")
              .replace(/\s{2,}/g, " ")
              .replace(/\s+$/, "");
          }
          return lines.join("\n");
        }

        function addMissingDeadlines(text) {
          const source = String(text || "").replace(/\r\n/g, "\n");
          const parsed = parseAgenda(
            parseStartTime(source) ? stripAgendaDeadlinesForSchedule(source) : source,
          );
          const lines = String(text || "")
            .replace(/\r\n/g, "\n")
            .split("\n");
          let inAgenda = false;
          let parsedItemIdx = 0;
          let agendaOrdinal = 0;
          let count = 0;
          let deadlineCount = 0;
          let renumberCount = 0;
          for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const trimmed = line.trim();
            const headerM = trimmed.match(/^\*\*\s*(.+?)\s*\*\*\s*$/);
            if (headerM) {
              inAgenda = /^agenda$/i.test(headerM[1]);
              continue;
            }
            if (!inAgenda) continue;
            const m = line.match(/^(\s*)(?:(\d+)\.\s+|([-*])\s+)(.*\S)\s*$/);
            if (!m) continue;
            agendaOrdinal++;
            let nextLine = line;
            let changed = false;
            if (m[2] && Number(m[2]) !== agendaOrdinal) {
              nextLine = `${m[1]}${agendaOrdinal}. ${m[4]}`;
              changed = true;
              renumberCount++;
            }
            if (!SEP_RE.test(line)) {
              lines[i] = nextLine;
              if (changed) count++;
              continue;
            }
            const item = parsed.items[parsedItemIdx];
            parsedItemIdx++;
            if (!item || !item.deadlineLabel) {
              lines[i] = nextLine;
              if (changed) count++;
              continue;
            }
            const withDeadline = replaceAgendaDeadline(
              nextLine,
              item.deadlineLabel,
            );
            lines[i] = withDeadline;
            if (withDeadline !== nextLine) {
              deadlineCount++;
              count++;
            } else if (changed) {
              count++;
            }
          }
          return {
            text: lines.join("\n"),
            count,
            deadlineCount,
            renumberCount,
          };
        }

        window.parseAgenda = parseAgenda;
        window.formatDurLabel = formatDurLabel;
        window.fmtClock = fmtClock;
        window.convertDiscordTimestamps = convertDiscordTimestamps;
        window.addMissingDeadlines = addMissingDeadlines;
      })();
    </script>

            const empty = {
              count: 0,
              deadlineCount: 0,
              renumberCount: 0,
            };
            if (!window.addMissingDeadlines) return empty;
            try {
              const fix = window.addMissingDeadlines(text);
              return {
                count: fix.count || 0,
                deadlineCount: fix.deadlineCount || 0,
                renumberCount: fix.renumberCount || 0,
              };
            } catch {
              return empty;
            }
          }, [text]);
          const agendaFixCount = agendaFix.count;
          const agendaFixTitle =
            agendaFix.deadlineCount > 0 && agendaFix.renumberCount > 0
              ? `Fix ${agendaFixCount} agenda line${agendaFixCount === 1 ? "" : "s"}: timings and numbering`
              : agendaFix.renumberCount > 0
                ? `Renumber ${agendaFix.renumberCount} agenda line${agendaFix.renumberCount === 1 ? "" : "s"}`
                : `Fix ${agendaFix.deadlineCount} agenda timing${agendaFix.deadlineCount === 1 ? "" : "s"}`;

          function fillDeadlines() {
            if (!window.addMissingDeadlines) return;
            const { text: next, count } = window.addMissingDeadlines(text);
            if (!count) return;
            setText(next);
            onLoad(next);
          }

          function pasteHumanReadableTimes(e) {
            if (!window.convertDiscordTimestamps) return;
            const pasted = e.clipboardData?.getData("text");
            if (!pasted || !/<t:-?\d+(?::[tTdDfFR])?>/.test(pasted)) return;
            e.preventDefault();
            const textarea = e.currentTarget;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const converted = window.convertDiscordTimestamps(pasted);
            const next = text.slice(0, start) + converted + text.slice(end);
            setText(next);
            requestAnimationFrame(() => {
              const caret = start + converted.length;
              textarea.setSelectionRange(caret, caret);
            });
          }

          function sourceActionButtonStyle(pushRight) {
            return {
              width: 28,
              height: 28,
              display: "inline-flex",
              alignItems: "center",
              justifyContent: "center",
              border: "1px solid var(--line)",
              background: "var(--surface-hover)",
              color: "var(--muted)",
              borderRadius: 7,
              cursor: "pointer",
              marginLeft: pushRight ? "auto" : 0,
              transition:
                "border-color 140ms var(--ease-fast), color 140ms var(--ease-fast), background 140ms var(--ease-fast)",
            };
          }

          function handleSourceActionEnter(e) {
            e.currentTarget.style.borderColor = "var(--line-strong)";
            e.currentTarget.style.color = "var(--ink)";
            e.currentTarget.style.background = "var(--surface-active)";
          }

          function handleSourceActionLeave(e) {
            e.currentTarget.style.borderColor = "var(--line)";
            e.currentTarget.style.color = "var(--muted)";
            e.currentTarget.style.background = "var(--surface-hover)";
          }

          function toDiscordTimestamp(date, style = "t") {
            return `<t:${Math.floor(date.getTime() / 1000)}:${style}>`;
          }

          function dateFromMeetingStart(startTime) {
            const d = new Date();
            if (startTime?.date) {
              d.setFullYear(
                startTime.date.year,
                startTime.date.monthIndex,
                startTime.date.day,
              );
            }
            d.setHours(startTime.h, startTime.m, 0, 0);
            return d;
          }

          function datedDeadline(deadline, startTime, after) {
            const d = startTime ? dateFromMeetingStart(startTime) : new Date();
            d.setHours(deadline.h, deadline.m, 0, 0);
            const floor =
              after || (startTime?.date ? dateFromMeetingStart(startTime) : null);
            if (floor) {
              while (d.getTime() < floor.getTime()) {
                d.setDate(d.getDate() + 1);
              }
            }
            return d;
          }

          function discordStartTimeLine(startTime) {
            if (!startTime) return "";
            const sourceLine = text.match(
              /^.*\*\*\s*Start\s*Time\s*:?\s*\*\*.*$/im,
            )?.[0];
            const suffix =
              sourceLine?.match(/\b(?:am|pm)\b(.*)$/i)?.[1] || "";
            const start = dateFromMeetingStart(startTime);
            const convertedSuffix = suffix.replace(
              /\b(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/gi,
              (_, hour, minute, meridiem) => {
                let h = parseInt(hour, 10);
                const m = minute ? parseInt(minute, 10) : 0;
                const ap = meridiem.toLowerCase();
                if (ap === "pm" && h < 12) h += 12;
                if (ap === "am" && h === 12) h = 0;
                const eventTime = datedDeadline(
                  { h, m },
                  startTime,
                  start,
                );
                return toDiscordTimestamp(eventTime);
              },
            );
            const startStyle = startTime.date ? "f" : "t";
            return `**Start Time:** ${toDiscordTimestamp(start, startStyle)}${convertedSuffix}`;
          }

          function buildDiscordTimings() {
            if (!window.parseAgenda) return "";
            const meeting = window.parseAgenda(text);
            const lines = [];
            const meetingHeader = text.match(/^\s*#\s+.+$/m)?.[0].trim();
            if (meetingHeader) lines.push(meetingHeader, "");
            const startLine = discordStartTimeLine(meeting.startTime);
            if (startLine) lines.push(startLine, "");
            if (meeting.items.length) lines.push("**Agenda**");
            let running = null;
            if (meeting.startTime) {
              running = dateFromMeetingStart(meeting.startTime);
            }
            meeting.items.forEach((it, idx) => {
              let end = it.deadline
                ? datedDeadline(it.deadline, meeting.startTime, running)
                : running
                  ? new Date(running.getTime() + it.durationMs)
                  : null;
              if (!end) return;
              const start = new Date(end.getTime() - it.durationMs);
              const timestamp = toDiscordTimestamp(end);
              const sourceText = it.sourceText ||
                `${it.title} - ${it.durationLabel}`;
              const timedText = /\bby\s+\d{1,2}(?::\d{2})?\s*(?:am|pm)?/i.test(
                sourceText,
              )
                ? sourceText.replace(
                    /\bby\s+\d{1,2}(?::\d{2})?\s*(?:am|pm)?/i,
                    `by ${timestamp}`,
                  )
                : `${sourceText}, by ${timestamp}`;
              lines.push(`${idx + 1}. ${timedText}`);
              if (it.subs.length) {
                let subRun = start;
                it.subs.forEach((sub) => {
                  subRun = new Date(subRun.getTime() + sub.durationMs);
                  const subEnd =
                    subRun.getTime() > end.getTime() ? end : subRun;
                  lines.push(
                    `   - ${sub.name} - ${toDiscordTimestamp(subEnd)}`,
                  );
                });
              }
              running = end;
            });
            return lines.join("\n");
          }

          async function copyDiscordTimings() {
            const timings = buildDiscordTimings();
            if (!timings) return;
            try {
              if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(timings);
              } else {
                throw new Error("Clipboard API unavailable");
              }
            } catch {
              const el = document.createElement("textarea");
              el.value = timings;
              el.setAttribute("readonly", "");
              el.style.position = "fixed";
              el.style.opacity = "0";
              document.body.appendChild(el);
              el.select();
              document.execCommand("copy");
              document.body.removeChild(el);
            }
            setCopiedDiscordTimings(true);
            window.setTimeout(() => setCopiedDiscordTimings(false), 1600);
          }

          return (
            <section
              style={{
                borderBottom: "1px solid var(--line)",
                padding: "12px 12px 14px",
              }}
            >
              <button
                type="button"
                onClick={() => setOpen((v) => !v)}
                style={{
                  background: "transparent",
                  border: 0,
                  padding: 0,
                  cursor: "pointer",
                  width: "100%",
                  display: "flex",
                  alignItems: "center",
                  gap: 6,
                  color: "var(--muted)",
                  fontFamily: "var(--sans)",
                  fontSize: 11,
                  fontWeight: 600,
                  letterSpacing: "0.14em",
                  textTransform: "uppercase",
                }}
              >
                <svg
                  width="10"
                  height="10"
                  viewBox="0 0 10 10"
                  fill="none"
                  style={{
                    transform: open ? "rotate(90deg)" : "rotate(0deg)",
                    transition: "transform 120ms",
                  }}
                >
                  <path
                    d="M3 1.5L7 5L3 8.5"
                    stroke="currentColor"
                    strokeWidth="1.4"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                  />
                </svg>
                Agenda Source
              </button>

              <Collapse open={open}>
                <div style={{ marginTop: 12 }}>
                  <textarea
                    value={text}
                    onChange={(e) => setText(e.target.value)}
                    onPaste={pasteHumanReadableTimes}
                    placeholder={sampleText || ""}
                    spellCheck={false}
                    style={{
                      width: "100%",
                      minHeight: 180,
                      padding: 12,
                      border: "1px solid var(--line)",
                      borderRadius: 8,
                      background: "var(--surface-hover)",
                      color: "var(--ink)",
                      fontFamily: "var(--sans)",
                      fontSize: 13,
                      fontWeight: 500,
                      lineHeight: 1.5,
                      letterSpacing: "-0.005em",
                      resize: "vertical",
                      outline: "none",
                      transition:
                        "border-color 140ms var(--ease-fast), background 140ms var(--ease-fast)",
                    }}
                    onFocus={(e) => {
                      e.currentTarget.style.borderColor = "var(--line-strong)";
                      e.currentTarget.style.background =
                        "var(--surface-active)";
                    }}
                    onBlur={(e) => {
                      e.currentTarget.style.borderColor = "var(--line)";
                      e.currentTarget.style.background = "var(--surface-hover)";
                    }}
                  />
                  <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                    <GhostButton primary small onClick={() => onLoad(text)}>
                      Load
                    </GhostButton>
                    <GhostButton
                      small
                      onClick={() => {
                        if (sampleText) setText(sampleText);
                        onSample && onSample();
                      }}
                    >
                      Sample
                    </GhostButton>
                    <button
                      type="button"
                      onClick={copyDiscordTimings}
                      title={
                        copiedDiscordTimings
                          ? "Copied Discord timestamps"
                          : "Copy timings as Discord timestamps"
                      }
                      aria-label={
                        copiedDiscordTimings
                          ? "Copied Discord timestamps"
                          : "Copy timings as Discord timestamps"
                      }
                      style={sourceActionButtonStyle(true)}
                      onMouseEnter={handleSourceActionEnter}
                      onMouseLeave={handleSourceActionLeave}
                    >
                      {copiedDiscordTimings ? (
                        <svg
                          width="14"
                          height="14"
                          viewBox="0 0 14 14"
                          fill="none"
                        >
                          <path
                            d="M2.7 7.1L5.7 10.1L11.3 3.9"
                            stroke="currentColor"
                            strokeWidth="1.4"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                          />
                        </svg>
                      ) : (
                        <svg
                          width="14"
                          height="14"
                          viewBox="0 0 127.14 96.36"
                          fill="none"
                        >
                          <path
                            d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0a105.89 105.89 0 0 0-26.25 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45 65.69C36.18 65.69 31 60 31 53s5-12.74 11.43-12.74S54 46 53.89 53s-5.05 12.69-11.44 12.69Zm42.24 0C78.41 65.69 73.25 60 73.25 53s5-12.74 11.44-12.74S96.23 46 96.12 53s-5.05 12.69-11.43 12.69Z"
                            fill="currentColor"
                          />
                        </svg>
                      )}
                    </button>
                    {agendaFixCount > 0 && (
                      <button
                        type="button"
                        onClick={fillDeadlines}
                        title={agendaFixTitle}
                        aria-label={agendaFixTitle}
                        style={sourceActionButtonStyle(false)}
                        onMouseEnter={handleSourceActionEnter}
                        onMouseLeave={handleSourceActionLeave}
                      >
                        {agendaFix.deadlineCount > 0 ? (
                          <svg
                            width="14"
                            height="14"
                            viewBox="0 0 14 14"
                            fill="none"
                          >
                            <circle
                              cx="7"
                              cy="7.5"
                              r="5"
                              stroke="currentColor"
                              strokeWidth="1.3"
                            />
                            <path
                              d="M7 5V7.5L8.5 8.75"
                              stroke="currentColor"
                              strokeWidth="1.3"
                              strokeLinecap="round"
                              strokeLinejoin="round"
                            />
                            <path
                              d="M10.5 2.2L12 3.5M3.5 2.2L2 3.5"
                              stroke="currentColor"
                              strokeWidth="1.3"
                              strokeLinecap="round"
                            />
                          </svg>
                        ) : (
                          <svg
                            width="14"
                            height="14"
                            viewBox="0 0 14 14"
                            fill="none"
                          >
                            <path
                              d="M4.7 3.5H11.3M4.7 7H11.3M4.7 10.5H11.3"
                              stroke="currentColor"
                              strokeWidth="1"
                              strokeLinecap="round"
                            />
                            <path
                              d="M2.25 2.95L2.85 2.55V4.45M2.25 6.55C2.25 6.1 2.58 5.85 3 5.85C3.42 5.85 3.75 6.1 3.75 6.52C3.75 7.05 2.35 7.9 2.35 7.9H3.85M2.3 9.85H3.75L3.05 10.52C3.55 10.55 3.85 10.82 3.85 11.2C3.85 11.65 3.5 11.9 3.05 11.9C2.68 11.9 2.4 11.75 2.2 11.5"
                              stroke="currentColor"
                              strokeWidth="0.8"
                              strokeLinecap="round"
                              strokeLinejoin="round"
                            />
                          </svg>
                        )}
                      </button>
                    )}
                  </div>
                  {errors && errors.length > 0 && (
                    <div
                      style={{
                        marginTop: 10,
                        padding: "8px 10px",
                        fontSize: 12,
                        lineHeight: 1.5,
                        background: "rgba(177, 57, 31, 0.07)",
                        border: "1px solid rgba(177, 57, 31, 0.2)",
                        color: "var(--bad)",
                        borderRadius: 8,
                      }}
                    >
                      {errors.slice(0, 3).map((e, i) => (
                        <div key={i}>• {e}</div>
                      ))}
                    </div>
                  )}
                </div>
              </Collapse>
            </section>
          );
        }

        function durColStyle() {
          return {
            width: 56,
            flexShrink: 0,
            display: "flex",
            flexDirection: "column",
            alignItems: "flex-end",
            fontSize: 11,
            color: "var(--faint)",
            fontVariantNumeric: "tabular-nums",
            whiteSpace: "nowrap",
            lineHeight: 1.15,
          };
        }
        function navItemStyle(active) {
          return {
            width: "100%",
            display: "flex",
            alignItems: "center",
            gap: 8,
            padding: "6px 10px",
            margin: "1px 0",
            border: 0,
            background: active ? "var(--accent-soft)" : "transparent",
            boxShadow: active
              ? "0 0 0 1px color-mix(in oklch, var(--accent) 30%, transparent) inset"
              : "none",
            borderRadius: 8,
            cursor: "pointer",
            textAlign: "left",
            fontFamily: "var(--sans)",
            fontSize: 13.5,
            color: "var(--ink)",
            transition:
              "background 140ms var(--ease-fast), box-shadow 140ms var(--ease-fast)",
          };
        }
        function numStyle(active) {
          return {
            width: 20,
            flexShrink: 0,
            fontFamily: "var(--sans)",
            fontSize: 10.5,
            fontWeight: 500,
            color: active ? "var(--accent)" : "var(--faint)",
            fontVariantNumeric: "tabular-nums",
            textAlign: "left",
            letterSpacing: "0.02em",
          };
        }

        function AgendaList({
          items,
          currentSlide,
          slides,
          onJump,
          totalLabel,
        }) {
          const [open, setOpen] = useState(true);
          if (!items.length) {
            return (
              <section
                style={{
                  padding: "18px 20px",
                  color: "var(--muted)",
                  fontSize: 13,
                }}
              >
                <Eyebrow color="var(--muted)">Agenda</Eyebrow>
                <p style={{ marginTop: 14, lineHeight: 1.5 }}>
                  Paste an agenda above to begin.
                </p>
              </section>
            );
          }

          function slideIndexFor(itemIdx, subIdx) {
            return slides.findIndex(
              (s) =>
                s.kind === "agenda" &&
                s.item.agendaIndex === itemIdx &&
                (subIdx == null ? s.subIndex == null : s.subIndex === subIdx),
            );
          }

          const titleSlide = 0;
          const completeSlide = slides.length - 1;
          const cur = slides[currentSlide] || null;

          return (
            <section
              style={{ padding: "0 12px 16px", flex: 1, overflowY: "auto" }}
            >
              <button
                type="button"
                onClick={() => setOpen((v) => !v)}
                style={{
                  background: "transparent",
                  border: 0,
                  padding: "10px 4px",
                  cursor: "pointer",
                  width: "100%",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  color: "var(--muted)",
                }}
              >
                <span
                  style={{
                    display: "inline-flex",
                    alignItems: "center",
                    gap: 6,
                    fontFamily: "var(--sans)",
                    fontSize: 11,
                    fontWeight: 600,
                    letterSpacing: "0.14em",
                    textTransform: "uppercase",
                  }}
                >
                  <svg
                    width="10"
                    height="10"
                    viewBox="0 0 10 10"
                    fill="none"
                    style={{
                      transform: open ? "rotate(90deg)" : "rotate(0deg)",
                      transition: "transform 120ms",
                    }}
                  >
                    <path
                      d="M3 1.5L7 5L3 8.5"
                      stroke="currentColor"
                      strokeWidth="1.4"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    />
                  </svg>
                  Agenda
                </span>
                <span
                  style={{
                    fontSize: 11,
                    color: "var(--faint)",
                    fontVariantNumeric: "tabular-nums",
                  }}
                >
                  {totalLabel}
                </span>
              </button>

              <Collapse open={open}>
                <div>
                  <button
                    type="button"
                    onClick={() => onJump(titleSlide)}
                    className={`mm-nav-btn${currentSlide === titleSlide ? " mm-active" : ""}`}
                    style={navItemStyle(currentSlide === titleSlide)}
                  >
                    <span style={numStyle(currentSlide === titleSlide)}>—</span>
                    <span
                      style={{
                        fontWeight: 500,
                        color: "var(--ink-2)",
                        flex: 1,
                        minWidth: 0,
                        overflow: "hidden",
                        textOverflow: "ellipsis",
                        whiteSpace: "nowrap",
                      }}
                    >
                      Title
                    </span>
                    <div style={durColStyle()} />
                  </button>

                  {items.map((it) => {
                    const itSlide = slideIndexFor(it.agendaIndex, null);
                    const isActive =
                      cur &&
                      cur.kind === "agenda" &&
                      cur.item.agendaIndex === it.agendaIndex;
                    const isThisRowActive =
                      isActive &&
                      (cur.subIndex == null || it.subs.length === 0);
                    return (
                      <div key={it.agendaIndex}>
                        <button
                          type="button"
                          onClick={() => onJump(itSlide)}
                          className={`mm-nav-btn${isThisRowActive ? " mm-active" : ""}`}
                          style={navItemStyle(isThisRowActive)}
                        >
                          <span style={numStyle(isThisRowActive)}>
                            {it.agendaIndex}
                          </span>
                          <div
                            style={{
                              display: "flex",
                              flexDirection: "column",
                              gap: 2,
                              minWidth: 0,
                              flex: 1,
                            }}
                          >
                            <span
                              style={{
                                fontWeight: 500,
                                color: "var(--ink)",
                                overflow: "hidden",
                                textOverflow: "ellipsis",
                                whiteSpace: "nowrap",
                              }}
                            >
                              {it.title}
                            </span>
                            {it.names.length > 0 && (
                              <span
                                style={{
                                  fontSize: 11,
                                  color: "var(--muted)",
                                  overflow: "hidden",
                                  textOverflow: "ellipsis",
                                  whiteSpace: "nowrap",
                                }}
                              >
                                {it.names.join(", ")}
                              </span>
                            )}
                          </div>
                          <div style={durColStyle()}>
                            <span
                              style={{
                                color: "var(--ink)",
                                fontWeight: 500,
                                fontSize: 12,
                              }}
                            >
                              {it.durationLabel}
                            </span>
                            {it.deadlineLabel && (
                              <span
                                style={{
                                  color: "var(--faint)",
                                  fontWeight: 400,
                                  fontSize: 11,
                                  marginTop: 1,
                                }}
                              >
                                {it.deadlineLabel}
                              </span>
                            )}
                          </div>
                        </button>

                        {it.subs.map((s, si) => {
                          const ss = slideIndexFor(it.agendaIndex, si);
                          const subActive =
                            cur &&
                            cur.kind === "agenda" &&
                            cur.item.agendaIndex === it.agendaIndex &&
                            cur.subIndex === si;
                          return (
                            <button
                              key={si}
                              type="button"
                              onClick={() => onJump(ss)}
                              className={`mm-nav-btn${subActive ? " mm-active" : ""}`}
                              style={{
                                ...navItemStyle(subActive),
                                paddingLeft: 24,
                              }}
                            >
                              <span
                                style={{
                                  ...numStyle(subActive),
                                  fontSize: 10,
                                  width: 16,
                                }}
                              >
                                {String.fromCharCode(97 + si)}
                              </span>
                              <span
                                style={{
                                  fontWeight: 500,
                                  color: "var(--ink-2)",
                                  flex: 1,
                                  minWidth: 0,
                                  overflow: "hidden",
                                  textOverflow: "ellipsis",
                                  whiteSpace: "nowrap",
                                }}
                              >
                                {s.name}
                              </span>
                              <div style={durColStyle()}>
                                <span
                                  style={{
                                    color: "var(--ink)",
                                    fontWeight: 500,
                                    fontSize: 12,
                                  }}
                                >
                                  {formatDurLabel(s.durationMs)}
                                </span>
                                {s.deadlineLabel && (
                                  <span
                                    style={{
                                      color: "var(--faint)",
                                      fontWeight: 400,
                                      fontSize: 11,
                                      marginTop: 1,
                                    }}
                                  >
                                    {s.deadlineLabel}
                                  </span>
                                )}
                              </div>
                            </button>
                          );
                        })}
                      </div>
                    );
                  })}

                  <button
                    type="button"
                    onClick={() => onJump(completeSlide)}
                    className={`mm-nav-btn${currentSlide === completeSlide ? " mm-active" : ""}`}
                    style={navItemStyle(currentSlide === completeSlide)}
                  >
                    <span style={numStyle(currentSlide === completeSlide)}>
                      ✓
                    </span>
                    <span
                      style={{
                        fontWeight: 500,
                        color: "var(--ink-2)",
                        flex: 1,
                        minWidth: 0,
                        overflow: "hidden",
                        textOverflow: "ellipsis",
                        whiteSpace: "nowrap",
                      }}
                    >
                      Complete
                    </span>
                    <div style={durColStyle()} />

        function FitText({ children, maxWidth }) {
          const ref = useRef(null);
          const [scale, setScale] = useState(1);
          useLayoutEffect(() => {
            const el = ref.current;
            if (!el) return;
            const natural = el.scrollWidth;
            if (!natural) return;
            const next = natural > maxWidth ? maxWidth / natural : 1;
            setScale(next);
          }, [children, maxWidth]);
          return (
            <div

        function fmtTimer(ms) {
          const a = Math.abs(ms);
          const totalSec = ms < 0 ? Math.floor(a / 1000) : Math.ceil(a / 1000);
          const sign = ms < 0 && totalSec > 0 ? "-" : "";
          const m = Math.floor(totalSec / 60);
          const s = totalSec % 60;
          return `${sign}${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        }

        function parseTimeInput(raw) {
          if (raw == null) return null;
          let s = String(raw).trim();
          if (!s) return null;
          let sign = 1;
          if (s.startsWith("-")) {
            sign = -1;
            s = s.slice(1);
          }
          if (s.startsWith("+")) s = s.slice(1);
          const parts = s.split(":").map((p) => p.trim());
          if (parts.some((p) => p === "" || !/^\d+$/.test(p))) return null;
          const nums = parts.map((p) => parseInt(p, 10));
          let secs = 0;
          if (nums.length === 1) secs = nums[0] * 60;
          else if (nums.length === 2) secs = nums[0] * 60 + nums[1];
          else if (nums.length === 3)
            secs = nums[0] * 3600 + nums[1] * 60 + nums[2];
          else return null;
          return sign * secs * 1000;
        }

        function EditableTime({
          ms,
          color,
          fontSize,
          fontWeight,
          letterSpacing,
          fitTo,
          onBeginEdit,
          onCommit,
        }) {
          const [editing, setEditing] = useState(false);
          const [draft, setDraft] = useState("");
          const inputRef = useRef(null);

          function start() {
            if (onBeginEdit) onBeginEdit();
            const formatted = fmtTimer(ms).replace(/^0(\d)/, "$1");
            setDraft(formatted);
            setEditing(true);
          }
          function commit() {
            const parsed = parseTimeInput(draft);
            if (parsed != null && onCommit) onCommit(parsed);
            setEditing(false);
          }
          function cancel() {
            setEditing(false);
          }

          useEffect(() => {
            if (editing && inputRef.current) {
              inputRef.current.focus();
              inputRef.current.select();
            }
          }, [editing]);

          const baseStyle = {
            fontFamily: "var(--num)",
            fontSize,
            fontWeight,
            letterSpacing: letterSpacing || "-0.015em",
            color,
            fontVariantNumeric: "tabular-nums",
            lineHeight: 1,
            // Match the ring/bar's 240ms color fade so the numbers don't snap to grey
            // ahead of the ring on pause/resume.
            transition: "color 240ms ease",
          };

          if (editing) {
            const chars = Math.max(4, draft.length);
            const effFontSize = fitTo
              ? Math.min(fontSize, Math.floor(fitTo / (chars * 0.62)))
              : fontSize;
            return (
              <input
                ref={inputRef}
                type="text"
                inputMode="numeric"
                value={draft}
                onChange={(e) => setDraft(e.target.value)}
                onBlur={commit}
                onKeyDown={(e) => {
                  if (e.key === "Enter") {
                    e.preventDefault();
                    commit();
                  } else if (e.key === "Escape") {
                    e.preventDefault();
                    cancel();
                  }
                }}
                style={{
                  ...baseStyle,
                  fontSize: effFontSize,
                  width: `${chars}ch`,
                  maxWidth: fitTo ? fitTo : "100%",
                  background: "transparent",
                  border: 0,
                  borderBottom: `2px dashed ${color}`,
                  outline: "none",
                  padding: 0,
                  textAlign: "center",
                  caretColor: color,
                }}
              />
            );
          }
          const content = (
            <span
              onClick={start}
              title="Click to edit"
              style={{
                ...baseStyle,
                cursor: "text",
                display: "inline-block",
                padding: "0 2px",
                borderRadius: 4,
              }}
              onMouseEnter={(e) => {
                e.currentTarget.style.background = "var(--paper-2)";
              }}
              onMouseLeave={(e) => {
                e.currentTarget.style.background = "transparent";
              }}
            >
              {fmtTimer(ms)}
            </span>
          );
          return fitTo ? (
            <FitText maxWidth={fitTo}>{content}</FitText>
          ) : (
            content
          );
        }

        function FlatTimer({
          remainingMs,
          durationMs,
          running,
          onToggle,
          onReset,
          onBump,
          onSetTime,
          onReadTime,
          state,
          color,
          tweaks,
        }) {
          const effDuration = Math.max(durationMs, remainingMs);
          const elapsed = effDuration - remainingMs;
          const pct =
            effDuration > 0
              ? Math.max(0, Math.min(1, elapsed / effDuration))
              : 0;

          const prevMsRef = useRef(remainingMs);
          const barRef = useRef(null);
          useLayoutEffect(() => {
            const prev = prevMsRef.current;
            prevMsRef.current = remainingMs;
            if (!running) return;
            if (Math.abs(remainingMs - prev) <= 200) return;
            const node = barRef.current;
            if (!node || typeof node.animate !== "function") return;
            const prevElapsed = effDuration - prev;
            const prevPct =
              effDuration > 0
                ? Math.max(0, Math.min(1, prevElapsed / effDuration))
                : 0;
            try {
              node.animate(
                [{ width: `${prevPct * 100}%` }, { width: `${pct * 100}%` }],
                { duration: 360, easing: "cubic-bezier(0.22, 1, 0.36, 1)" },
              );
            } catch (e) {
              /* no-op */
            }
          }, [remainingMs, running, effDuration, pct]);
          const showTransition = !running;
          return (
            <div
              style={{
                display: "flex",
                flexDirection: "column",
                borderTop: "1px solid var(--line)",
                background:

                backdropFilter: "blur(20px)",
                WebkitBackdropFilter: "blur(20px)",

              <div style={{ height: 3, background: "var(--line)" }}>
                <div
                  ref={barRef}
                  style={{
                    height: "100%",
                    width: `${pct * 100}%`,

                    transition: showTransition
                      ? "width 360ms cubic-bezier(0.22, 1, 0.36, 1), background 240ms ease"
                      : "background 240ms ease",
                  }}
                />
              </div>
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  padding: "18px 28px",
                }}
              >
                <div
                  style={{ display: "flex", alignItems: "baseline", gap: 18 }}
                >
                  <span
                    style={{
                      fontFamily: "var(--num)",
                      fontSize: 72,
