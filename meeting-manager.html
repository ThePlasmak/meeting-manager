        function TimerRing({
          remainingMs,
          durationMs,
          running,
          onToggle,
          onReset,
          onBump,
          onSetTime,
          onReadTime,
          tweaks,
        }) {
          const effDuration = Math.max(durationMs, remainingMs);

          const prevMsRef = useRef(remainingMs);
          const ringArcRef = useRef(null);
          const showTransition = !running;

          const elapsed = effDuration - remainingMs;
          const pct =
            effDuration > 0
              ? Math.max(0, Math.min(1, elapsed / effDuration))
              : 0;
          const over = remainingMs < 0;
          const warn =
            !over && remainingMs <= durationMs * 0.2 && durationMs > 0;
          const state = over ? "over" : warn ? "warn" : "ok";
          // Paused → grey out the ring and readout so it visually reads as "stopped"
          // (matches the StatePill's muted treatment). Only switch to state colors
          // once the timer is actively running.
          const color = !running
            ? "var(--muted)"
            : state === "over"
              ? "var(--bad)"
              : state === "warn"
                ? "var(--warn)"
                : "var(--good)";

          const ringSize = 156;
          const stroke = 5;
          const r = (ringSize - stroke) / 2;
          const c = 2 * Math.PI * r;
          const dash = c * Math.max(0, Math.min(1, pct));

          useLayoutEffect(() => {
            const prev = prevMsRef.current;
            prevMsRef.current = remainingMs;
            if (!running) return;
            if (Math.abs(remainingMs - prev) <= 200) return;
            const node = ringArcRef.current;
            if (!node || typeof node.animate !== "function") return;
            const prevElapsed = effDuration - prev;
            const prevPct =
              effDuration > 0
                ? Math.max(0, Math.min(1, prevElapsed / effDuration))
                : 0;
            const prevDash = c * prevPct;
            try {
              node.animate(
                [
                  { strokeDasharray: `${prevDash} ${c}` },
                  { strokeDasharray: `${dash} ${c}` },
                ],
                { duration: 360, easing: "cubic-bezier(0.22, 1, 0.36, 1)" },
              );
            } catch (e) {
              /* WAAPI on SVG attrs unsupported — silently fall back to teleport */
            }
          }, [remainingMs, running, effDuration, c, dash]);

          if (!tweaks.ringTimer) {
            return (
              <FlatTimer
                tweaks={tweaks}
                remainingMs={remainingMs}
                durationMs={durationMs}
                running={running}
                onToggle={onToggle}
                onReset={onReset}
                onBump={onBump}
                onSetTime={onSetTime}
                onReadTime={onReadTime}
                state={state}
                color={color}
              />
            );
          }

          return (
            <div
              style={{
                display: "flex",
                alignItems: "center",
                gap: 24,
                padding: "16px 24px 18px",
                borderTop: "1px solid var(--line)",
                background:
                  "color-mix(in oklch, var(--paper) 70%, transparent)",
                backdropFilter: "blur(20px)",
                WebkitBackdropFilter: "blur(20px)",
              }}
            >
              <div
                style={{
                  position: "relative",
                  width: ringSize,
                  height: ringSize,
                  flexShrink: 0,
                }}
              >
                <svg
                  width={ringSize}
                  height={ringSize}
                  style={{ transform: "rotate(-90deg)" }}
                >
                  <circle
                    cx={ringSize / 2}
                    cy={ringSize / 2}
                    r={r}
                    stroke="var(--line)"
                    strokeWidth={stroke}
                    fill="none"
                  />
                  <circle
                    ref={ringArcRef}
                    cx={ringSize / 2}
                    cy={ringSize / 2}
                    r={r}
                    stroke={color}
                    strokeWidth={stroke}
                    strokeLinecap="round"
                    fill="none"
                    strokeDasharray={`${dash} ${c}`}
                    style={{
                      transition: showTransition
                        ? "stroke-dasharray 360ms cubic-bezier(0.22, 1, 0.36, 1), stroke 240ms ease"
                        : "stroke 240ms ease",
                    }}
                  />
                </svg>
                <div
                  style={{
                    position: "absolute",
                    inset: 0,
                    display: "flex",
                    flexDirection: "column",
                    alignItems: "center",
                    justifyContent: "center",
                    gap: 2,
                  }}
                >
                  <div
                    style={{
                      fontFamily: "var(--num)",
                      fontSize: 44,
                      fontWeight: 600,
                      letterSpacing: "-0.015em",
                      color,
                      fontVariantNumeric: "tabular-nums",
                      lineHeight: 1,
                    }}
                  >
                    <EditableTime
                      ms={remainingMs}
                      color={color}
                      fontSize={44}
                      fontWeight={600}
                      fitTo={ringSize - stroke * 2 - 16}
                      onBeginEdit={() => running && onToggle && onToggle()}
                      onCommit={(ms) => onSetTime && onSetTime(ms)}
                    />
                  </div>
                  <div
                    style={{
                      fontFamily: "var(--num)",
                      fontSize: 11,
                      fontWeight: 500,
                      color: "var(--faint)",
                      letterSpacing: "0.02em",
                      fontVariantNumeric: "tabular-nums",
                    }}
                  >
                    / {fmtTimer(durationMs)}
                  </div>
                </div>
              </div>

              <div
                style={{
                  display: "flex",
                  flexDirection: "column",
                  gap: 12,
                  flex: 1,
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <StatePill state={state} running={running} tweaks={tweaks} />
                </div>
                <div
                  style={{
                    display: "flex",
                    gap: 8,
                    flexWrap: "wrap",
                    alignItems: "center",
                  }}
                >
                  <PrimaryAction onClick={onToggle} running={running} />
                  <GhostButton
                    onClick={() => onBump(-60000)}
                    title="Subtract 1 minute"
                  >
                    −1 min
                  </GhostButton>
                  <GhostButton
                    onClick={() => onBump(60000)}
                    title="Add 1 minute"
                  >
                    +1 min
                  </GhostButton>
                  <IconButton
                    onClick={onReadTime}
                    title="Speak the remaining time aloud"
                  >
                    <SpeakerIcon />
                  </IconButton>
                  <IconButton onClick={onReset} title="Reset to original">
                    <ResetIcon />
                  </IconButton>
                </div>
              </div>
            </div>
          );
        }

        function LiveClock() {
          const [now, setNow] = useState(new Date());
          useEffect(() => {
            const t = setInterval(() => setNow(new Date()), 1000);
            return () => clearInterval(t);
          }, []);
          const h = now.getHours();
          const m = now.getMinutes();
          const s = now.getSeconds();
          const hh = ((h + 11) % 12) + 1;
          const ap = h >= 12 ? "PM" : "AM";
          return (
            <span
              style={{
                fontFamily: "var(--num)",
                fontSize: 13,
                fontWeight: 500,
                color: "var(--muted)",
                fontVariantNumeric: "tabular-nums",
                letterSpacing: "-0.005em",
              }}
            >
              {hh}:{String(m).padStart(2, "0")}:{String(s).padStart(2, "0")}{" "}
              {ap}
            </span>
          );
        }

        Object.assign(window, {
          Badge,
          Eyebrow,
          IconButton,
          GhostButton,
          AgendaInput,
          AgendaList,
          Stage,
          TimerRing,
          LiveClock,
          fmtTimer,
        });
      })();
    </script>

    <script type="text/babel" data-presets="react">

        function App() {

              window.speechSynthesis.removeEventListener?.(

          }, []);
          const [rawMarkdown, setRawMarkdown] = useState(
            initial?.rawMarkdown || SAMPLE,

          const [meeting, setMeeting] = useState(() =>
            window.parseAgenda(initial?.rawMarkdown || SAMPLE),
          );
          const [currentSlide, setCurrentSlide] = useState(
            initial?.currentSlide || 0,
          );
          const [remainingMap, setRemainingMap] = useState(
            initial?.remainingMap || {},
          );
          const [running, setRunning] = useState(false);
          const [sidebarOpen, setSidebarOpen] = useState(true);
          const [sidebarWidth, setSidebarWidth] = useState(
            () => initial?.sidebarWidth || 320,
          );
          const resizingRef = useRef(false);
          const [resizing, setResizing] = useState(false);

          function startResize(e) {
            e.preventDefault();
            resizingRef.current = true;
            setResizing(true);
            document.body.style.cursor = "col-resize";
            document.body.style.userSelect = "none";
            function onMove(ev) {
              if (!resizingRef.current) return;
              const w = Math.max(240, Math.min(560, ev.clientX));
              setSidebarWidth(w);
            }
            function onUp() {
              resizingRef.current = false;
              setResizing(false);
              document.body.style.cursor = "";
              document.body.style.userSelect = "";
              window.removeEventListener("mousemove", onMove);
              window.removeEventListener("mouseup", onUp);
            }
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
          }

          useEffect(() => {
            saveState({
              rawMarkdown,
              currentSlide,
              remainingMap,
              sidebarWidth,
              theme: t.dark ? "dark" : "light",
            });
          }, [rawMarkdown, currentSlide, remainingMap, sidebarWidth, t.dark]);

          const slide = meeting.slides[currentSlide] || meeting.slides[0];
          const timerInfo = useMemo(() => {
            if (!slide) return null;
            if (slide.kind === "title" || slide.kind === "complete") {
              return { key: slide.kind, durationMs: SYSTEM_SLIDE_TIMER_MS };
            }
            if (slide.kind !== "agenda") return null;
            const it = slide.item;
            if (slide.subIndex != null) {
              const s = it.subs[slide.subIndex];
              return { key: s.key, durationMs: s.durationMs };
            }
            if (it.subs.length) {
              // Item-overview slide for a sub-item parent — no timer. All time is
              // allocated to the children; the parent is just a heading/preview.
              return null;
            }
            return { key: it.key, durationMs: it.durationMs };
          }, [slide]);

          const remainingMs = timerInfo
            ? remainingMap[timerInfo.key] != null
              ? remainingMap[timerInfo.key]
              : timerInfo.durationMs
            : 0;

          const timerTitle = timerInfo ? fmtTimer(remainingMs) : null;
          useEffect(() => {
            document.title = timerTitle
              ? `${timerTitle} — Meeting Manager`
              : "Meeting Manager";
          }, [timerTitle]);

          const tickRef = useRef(null);
          useEffect(() => {
            if (!running || !timerInfo) return;
            let last = null;
            function step(now) {
              if (last == null) last = now;
              const dt = Math.max(0, now - last);
              last = now;
              if (dt > 0) {
                setRemainingMap((m) => ({
                  ...m,
                  [timerInfo.key]:
                    (m[timerInfo.key] != null
                      ? m[timerInfo.key]
                      : timerInfo.durationMs) - dt,
                }));
              }
              tickRef.current = requestAnimationFrame(step);
            }
            tickRef.current = requestAnimationFrame(step);
            return () => cancelAnimationFrame(tickRef.current);
          }, [running, timerInfo]);

          const audioCtxRef = useRef(null);
          function getAudio() {
            if (audioCtxRef.current) return audioCtxRef.current;
            try {
              const Ctx = window.AudioContext || window.webkitAudioContext;
              if (!Ctx) return null;
              audioCtxRef.current = new Ctx();
            } catch {
              return null;
            }
            return audioCtxRef.current;
          }
          function playTick(volume, emphasis) {
            const ctx = getAudio();
            if (!ctx) return;
            if (ctx.state === "suspended") ctx.resume();
            const now = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sine";
            osc.frequency.setValueAtTime(emphasis ? 880 : 660, now);
            const peak = (emphasis ? 0.22 : 0.13) * volume;
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime(
              Math.max(0.0002, peak),
              now + 0.006,
            );
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
            osc.connect(gain).connect(ctx.destination);
            osc.start(now);
            osc.stop(now + 0.22);
          }
          function playFinal(volume) {
            const ctx = getAudio();
            if (!ctx) return;
            if (ctx.state === "suspended") ctx.resume();
            const now = ctx.currentTime;
            const notes = [
              { f: 1318.5, t: 0.0, d: 0.7 },
              { f: 1760.0, t: 0.16, d: 0.9 },
            ];
            for (const n of notes) {
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.type = "triangle";
              osc.frequency.setValueAtTime(n.f, now + n.t);
              const peak = 0.28 * volume;
              gain.gain.setValueAtTime(0.0001, now + n.t);
              gain.gain.exponentialRampToValueAtTime(
                Math.max(0.0002, peak),
                now + n.t + 0.012,
              );
              gain.gain.exponentialRampToValueAtTime(0.0001, now + n.t + n.d);
              osc.connect(gain).connect(ctx.destination);
              osc.start(now + n.t);
              osc.stop(now + n.t + n.d + 0.05);
            }
          }

          const lastTickSecRef = useRef(null);
          useEffect(() => {
            if (!timerInfo) {
              lastTickSecRef.current = null;
              return;
            }
            if (!running) {
              lastTickSecRef.current = null;
              return;
            }
            if (!t.countdownSounds) return;
            const sec = remainingMs <= 0 ? 0 : Math.ceil(remainingMs / 1000);
            const prev = lastTickSecRef.current;
            if (prev === sec) return;
            lastTickSecRef.current = sec;
            const vol = Math.max(0, Math.min(1, t.soundVolume ?? 0.6));
            if (prev == null) {
              if (sec >= 1 && sec <= 10) playTick(vol, sec <= 5);
              return;
            }
            if (sec >= prev) return;

            remainingMs,
            running,
            timerInfo,
            t.countdownSounds,

            return () => window.removeEventListener("keydown", onKey);
          }, [currentSlide, goto, timerInfo]);

          const [dragHover, setDragHover] = useState(false);
          useEffect(() => {
            const dragCount = { current: 0 };
            function isAgendaDrag(e) {
              if (!e.dataTransfer) return false;
              return Array.from(e.dataTransfer.types || []).some((t) =>
                /file/i.test(t),

            }
            function onEnter(e) {
              if (!isAgendaDrag(e)) return;

              if (!isAgendaDrag(e)) return;

                  ? m[timerInfo.key]

            }));
          }

            if (!timerInfo) return;

            if (t.ttsVoice) {

            const femaleHints =
              /(zira|samantha|karen|victoria|allison|susan|kate|fiona|moira|tessa|jenny|aria|emma|amy|google us english|female)/i;
            return (
              voices.find((v) => femaleHints.test(v.name)) ||
              voices.find((v) => v.name.toLowerCase().includes("female")) ||
              voices[0] ||
              null
            );

            try {
              if (!t.countdownSounds) {
                window.speechSynthesis?.cancel();
                return;

              window.speechSynthesis.cancel();
              const u = new SpeechSynthesisUtterance(sentence);
              u.rate = 1.05;
              u.pitch = 1.05;
              const v = pickFemaleVoice();
              if (v) u.voice = v;
              window.speechSynthesis.speak(u);

            else phrase = `${secs} second${secs !== 1 ? "s" : ""}`;
            const sentence = over

                  min={0.4}
                  max={8}
                  step={0.1}
                  unit="s"
                  onChange={(v) => setTweak("overtimeGlowSpeed", v)}
                />
                <window.TweakSlider
                  label="Flame size"
                  value={t.overtimeFlameSize}
                  min={0.3}
                  max={2.5}
                  step={0.05}
                  unit="x"
                  onChange={(v) => setTweak("overtimeFlameSize", v)}
                />
                <window.TweakSlider
                  label="Flame speed"
                  value={t.overtimeFlameSpeed}
                  min={0.2}
                  max={4}
                  step={0.1}
                  unit="s"
                  onChange={(v) => setTweak("overtimeFlameSpeed", v)}
                />
              </window.TweakSection>

              <window.TweakSection label="Voice">
                <window.TweakSelect
                  label="Speak time voice"
                  value={t.ttsVoice}
                  onChange={(v) => {
                    setTweak("ttsVoice", v);
                    if (v) previewVoice(v);
                  }}
                  options={voiceOptions}
                />
                <window.TweakButton
                  label="Preview current voice"
                  onClick={() => previewVoice(t.ttsVoice)}
                />
              </window.TweakSection>

              <window.TweakSection label="Countdown sounds">
                <window.TweakToggle
                  label="Tick last 10 seconds"
                  value={t.countdownSounds}
                  onChange={(v) => setTweak("countdownSounds", v)}
                />
                <window.TweakSlider
                  label="Volume"
                  value={t.soundVolume}
                  min={0}
                  max={1}
                  step={0.05}
                  onChange={(v) => setTweak("soundVolume", v)}
                />
              </window.TweakSection>
            </window.TweaksPanel>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
      })();
    </script>
  </body>
</html>
