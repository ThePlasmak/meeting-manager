<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Serif+Display&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <style>
      :root {
        --paper: #f7f8fb;
        --paper-2: #eef1f6;
        --ink: #0e1626;
        --ink-2: #1e2940;
        --muted: #5d6779;
        --faint: #9aa3b6;
        --line: #dde2ec;
        --line-strong: #c4ccdb;
        --accent: #2257d6;
        --accent-soft: #d9e3f7;
        --good: #1f7a4d;
        --warn: #a16b00;
        --bad: #b03a2e;
        --shadow: 0 1px 0 rgba(14, 22, 38, 0.04), 0 12px 32px -16px rgba(14, 22, 38, 0.18);
        --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        --serif: "Instrument Serif", "Times New Roman", serif;
        --mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
        --num: "Inter", system-ui, sans-serif;
      }

      html[data-theme="dark"] {
        --paper: #0c1220;
        --paper-2: #131a2b;
        --ink: #e8ecf5;
        --ink-2: #c8cee0;
        --muted: #8f97ab;
        --faint: #5e667c;
        --line: #22293b;
        --line-strong: #303a52;
        --accent: #6c9cff;
        --accent-soft: #1c2c54;
        --good: #5fbe8e;
        --warn: #d4a046;
        --bad: #e07a6f;
        --shadow: 0 1px 0 rgba(0, 0, 0, 0.4), 0 18px 48px -20px rgba(0, 0, 0, 0.6);
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--paper);
        color: var(--ink);
        font-family: var(--sans);
        font-feature-settings: "ss01", "cv11";
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      button { font-family: inherit; color: inherit; }
      textarea {
        font-family: "Inter", system-ui, sans-serif;
      }
      ::selection { background: var(--accent-soft); color: var(--ink); }

      #root { height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script>
      window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "accent": "#0B6EAB",
        "titleFont": "inter-tight",
        "showSecondaryClock": true,
        "ringTimer": true,
        "overtimeStrokeColor": "#C2410C",
        "overtimeStrokeWidth": 3,
        "ttsVoice": "Microsoft Zira - English (United States)",
        "countdownSounds": true,
        "soundVolume": 0.6,
        "dark": false
      }/*EDITMODE-END*/;
    </script>

    <script type="text/babel" data-presets="react" src="./tweaks-panel.jsx"></script>
    <script type="text/babel" data-presets="react" src="./parse.jsx"></script>
    <script type="text/babel" data-presets="react" src="./components.jsx"></script>
    <script type="text/babel" data-presets="react" src="./app.jsx"></script>
  </body>
</html>
